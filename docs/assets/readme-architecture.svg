<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07090C"/>
      <stop offset="0.52" stop-color="#10151B"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF7A2F"/>
      <stop offset="1" stop-color="#E5481B"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrowWarm" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#F7E7BC"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#34D399"/>
    </marker>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#22D3EE"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="32" fill="url(#pageBg)"/>

  <text x="70" y="76" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="850">Magic Stick Architecture</text>
  <text x="70" y="108" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">A compact Classic Bluetooth input device with explicit PortA ownership switching.</text>

  <g filter="url(#cardShadow)">
    <rect x="70" y="150" width="282" height="360" rx="22" fill="#111827" stroke="#F7E7BC" stroke-opacity="0.38" stroke-width="2"/>
    <rect x="94" y="174" width="88" height="28" rx="14" fill="#1F2937" stroke="#F7E7BC" stroke-opacity="0.45"/>
    <text x="112" y="194" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800">INPUTS</text>

    <rect x="94" y="230" width="234" height="66" rx="14" fill="#0B0F14" stroke="#F7E7BC" stroke-opacity="0.28"/>
    <circle cx="122" cy="263" r="12" fill="#EF4444"/>
    <text x="148" y="256" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">JoyC I2C</text>
    <text x="148" y="279" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">x/y, click, scroll gesture</text>

    <rect x="94" y="320" width="234" height="66" rx="14" fill="#0B0F14" stroke="#F7E7BC" stroke-opacity="0.28"/>
    <path d="M122 347v24M112 358h20" stroke="#34D399" stroke-width="5" stroke-linecap="round"/>
    <text x="148" y="346" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">PDM Mic</text>
    <text x="148" y="369" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">PCM capture, spectrum bins</text>

    <rect x="94" y="410" width="234" height="66" rx="14" fill="#0B0F14" stroke="#F7E7BC" stroke-opacity="0.28"/>
    <path d="M112 450l12-24 18 14-14 24z" stroke="#22D3EE" stroke-width="4" stroke-linejoin="round"/>
    <text x="148" y="436" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">IMU</text>
    <text x="148" y="459" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">pitch / roll cube display</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="460" y="136" width="280" height="392" rx="28" fill="#111827" stroke="#F97316" stroke-opacity="0.75" stroke-width="2.5"/>
    <rect x="494" y="168" width="212" height="52" rx="18" fill="url(#orange)"/>
    <text x="530" y="202" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="900">Magic Stick</text>

    <rect x="494" y="248" width="212" height="92" rx="16" fill="#0B0F14" stroke="#F7E7BC" stroke-opacity="0.35"/>
    <text x="520" y="280" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850">Device Mode</text>
    <text x="520" y="307" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">BtnA single / double</text>
    <text x="520" y="330" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">toggles mic and joystick</text>

    <rect x="494" y="368" width="212" height="92" rx="16" fill="#0B0F14" stroke="#34D399" stroke-opacity="0.42"/>
    <text x="520" y="400" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850">PortA Guard</text>
    <text x="520" y="427" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">JoyC and mic never</text>
    <text x="520" y="450" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">own GPIO0/GPIO26 together</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="848" y="150" width="282" height="360" rx="22" fill="#111827" stroke="#F7E7BC" stroke-opacity="0.38" stroke-width="2"/>
    <rect x="872" y="174" width="98" height="28" rx="14" fill="#1F2937" stroke="#F7E7BC" stroke-opacity="0.45"/>
    <text x="889" y="194" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800">OUTPUTS</text>

    <rect x="872" y="230" width="234" height="76" rx="14" fill="#0B0F14" stroke="#34D399" stroke-opacity="0.38"/>
    <text x="898" y="261" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">Classic BT HID</text>
    <text x="898" y="284" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">mouse, wheel, pan, F15</text>

    <rect x="872" y="334" width="234" height="76" rx="14" fill="#0B0F14" stroke="#22D3EE" stroke-opacity="0.38"/>
    <text x="898" y="365" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">Classic BT HFP</text>
    <text x="898" y="388" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">mic uplink audio channel</text>

    <rect x="872" y="438" width="234" height="46" rx="14" fill="#0B0F14" stroke="#F7E7BC" stroke-opacity="0.28"/>
    <text x="898" y="467" fill="#F7E7BC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">Host: one paired device</text>
  </g>

  <path d="M352 263H456" stroke="#F7E7BC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowWarm)"/>
  <path d="M352 353H456" stroke="#F7E7BC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowWarm)"/>
  <path d="M352 443H456" stroke="#F7E7BC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowWarm)"/>

  <path d="M740 270H848" stroke="#34D399" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M740 372H848" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
  <path d="M989 410V438" stroke="#F7E7BC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowWarm)"/>

  <rect x="300" y="560" width="600" height="42" rx="21" fill="#0B0F14" stroke="#F7E7BC" stroke-opacity="0.28"/>
  <text x="348" y="587" fill="#A1A1AA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Classic Bluetooth stack stays alive while hardware ownership switches underneath.</text>
</svg>
